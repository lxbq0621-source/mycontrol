<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心动设备 MCP 中继控制台</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fc;
            color: #333;
            padding: 15px;
            margin: 0;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #4a5568;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 6px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
            color: #718096;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background-color: #4299e1; color: white; }
        .btn-success { background-color: #48bb78; color: white; }
        .btn-danger { background-color: #f56565; color: white; grid-column: span 2; }
        .btn-action { background-color: #ed64a6; color: white; }
        .slider-group {
            margin: 15px 0;
        }
        .slider-group input {
            width: 100%;
        }
        #log {
            background-color: #1a202c;
            color: #a0aec0;
            padding: 10px;
            border-radius: 8px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #e2e8f0;
        }
        .online { background-color: #c6f6d5; color: #22543d; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📡 设备与中继配置</h2>
        <div class="form-group">
            <label>设备名过滤 (例如: HS141B)</label>
            <input type="text" id="deviceName" value="HS141B">
        </div>
        <div class="form-group">
            <label>服务 UUID</label>
            <input type="text" id="serviceUuid" value="FFE0">
        </div>
        <div class="form-group">
            <label>特征 UUID (写指令)</label>
            <input type="text" id="charUuid" value="FFE1">
        </div>
        <div class="form-group">
            <label>MCP 轮询地址</label>
            <input type="text" id="mcpUrl" value="http://127.0.0.1:3000/toy-next">
        </div>
        <div class="form-group">
            <label>自动续命间隔 (毫秒)</label>
            <input type="number" id="keepAliveInterval" value="5000">
        </div>
        
        <div class="btn-grid">
            <button class="btn-primary" onclick="connectBluetooth()">1. 连接蓝牙设备</button>
            <button class="btn-success" onclick="startMcpPolling()">2. 开启 MCP 轮询</button>
            <button class="btn-danger" onclick="stopAll()">🛑 停止所有功能 (断开/重置)</button>
        </div>
    </div>

    <div class="card">
        <h2>🎮 手动调试与测试</h2>
        <div class="slider-group">
            <label>吮吸强度等级: <span id="suckVal">0</span></label>
            <input type="range" id="suckSlider" min="0" max="5" value="0" oninput="updateSuck(this.value)">
        </div>
        <div class="form-group">
            <label>自定义十六进制指令 (例如: 55040101AA)</label>
            <input type="text" id="hexCommand" value="">
        </div>
        <div class="btn-grid" style="grid-template-columns: 1fr;">
            <button class="btn-action" onclick="sendCustomHex()">发送自定义测试指令</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 运行日志 <span id="pollStatus" class="status-tag">轮询未开启</span></h2>
        <div id="log">等待操作...</div>
    </div>

    <audio id="bgAudio" loop src="https://img.heliar.top/file/1772516513350_30min-osbvow_2.mp4" style="display:none;"></audio>

<script>
    let bluetoothDevice = null;
    let bleCharacteristic = null;
    let mcpTimer = null;
    let keepAliveTimer = null;
    let isPolling = false;

    // 格式化 UUID 为 Web Bluetooth 标准格式
    function formatUuid(uuid) {
        uuid = uuid.toLowerCase();
        if (uuid.length === 4) {
            return `0000${uuid}-0000-1000-8000-00805f9b34fb`;
        }
        return uuid;
    }

    function log(message, isInfo = true) {
        if (!isInfo) return; // 静默模式下，普通轮询跳过不打印
        const logArea = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        logArea.innerText += `[${time}] ${message}\n`;
        logArea.scrollTop = logArea.scrollHeight;
    }

    // 1. 连接蓝牙
    async function connectBluetooth() {
        const nameFilter = document.getElementById('deviceName').value.trim();
        const serviceUuidInput = document.getElementById('serviceUuid').value.trim();
        const charUuidInput = document.getElementById('charUuid').value.trim();

        const serviceUuid = formatUuid(serviceUuidInput);
        const charUuid = formatUuid(charUuidInput);

        try {
            log("正在请求寻找蓝牙设备...", true);
            const options = {
                filters: [{ namePrefix: nameFilter }],
                optionalServices: [serviceUuid]
            };
            
            if(!nameFilter) {
                options.acceptAllDevices = true;
            }

            bluetoothDevice = await navigator.bluetooth.requestDevice(options);
            log(`已选择设备: ${bluetoothDevice.name}，正在连接...`, true);

            const server = await bluetoothDevice.gatt.connect();
            log("GATT 服务已连接，正在获取主服务...", true);

            const service = await server.getPrimaryService(serviceUuid);
            bleCharacteristic = await service.getCharacteristic(charUuid);
            
            log("🎉 蓝牙连接并握手成功！特征通道就绪。", true);
            
            // 触发音频保活
            startAudioKeepAlive();
            // 开启硬件续命机制
            startDeviceKeepAlive();

        } catch (error) {
            log(`❌ 蓝牙连接失败: ${error.message}`, true);
        }
    }

    // 2. 发送十六进制数据到蓝牙
    async function sendHex(hexString) {
        if (!bleCharacteristic) {
            log("⚠️ 蓝牙未连接，无法发送指令", true);
            return;
        }
        try {
            hexString = hexString.replace(/\s+/g, '');
            if (hexString.length % 2 !== 0) {
                log("⚠️ 错误：十六进制指令长度必须为偶数", true);
                return;
            }
            const typedArray = new Uint8Array(hexString.match(/[\da-f]{2}/gi).map(h => parseInt(h, 16)));
            await bleCharacteristic.writeValue(typedArray);
            return true;
        } catch (error) {
            log(`❌ 指令发送失败: ${error.message}`, true);
            return false;
        }
    }

    // 3. MCP 轮询机制 (静默运行)
    function startMcpPolling() {
        if (isPolling) return;
        const url = document.getElementById('mcpUrl').value.trim();
        isPolling = true;
        document.getElementById('pollStatus').innerText = "轮询中...";
        document.getElementById('pollStatus').classList.add('online');
        log("🚀 开始高频轮询 MCP 服务器 (300ms 间隔)...", true);

        mcpTimer = setInterval(async () => {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP 状态码 ${response.status}`);
                const data = await response.json();

                // 核心解析逻辑
                if (data && data.command) {
                    const action = data.command.action;
                    const value = data.command.value;
                    
                    log(`📥 收到有效指令 -> action: ${action}, value: ${value}`, true);
                    
                    // 解析具体指令（此处以常见的 55 开头动作码举例，你可以自由根据真实协议调整）
                    if (action === "suck") {
                        document.getElementById('suckSlider').value = value;
                        document.getElementById('suckVal').innerText = value;
                        // 假设 0 等于停止，其余是对应挡位，转换成 Hex 写入
                        let hexCmd = "550201" + parseInt(value).toString(16).padStart(2, '0'); 
                        sendHex(hexCmd);
                    } else if (action === "custom_hex") {
                        sendHex(value);
                    }
                }
                // 如果返回 { "command": null } 则静默跳过，不输出任何日志
            } catch (error) {
                // 出错时打印日志
                log(`❌ MCP 轮询出错: ${error.message}`, true);
            }
        }, 300);
    }

    // 4. 设备专属续命机制 (KeepAlive 心跳)
    function startDeviceKeepAlive() {
        if (keepAliveTimer) clearInterval(keepAliveTimer);
        const interval = parseInt(document.getElementById('keepAliveInterval').value);
        
        keepAliveTimer = setInterval(() => {
            if (bleCharacteristic) {
                // 常见的保活心跳包常为 00 或特定指令，这里发送一个静默维持连接包
                // 小宝贝可以根据玩具的协议改成它的续命指令
                sendHex("00"); 
            }
        }, interval);
    }

    // 5. 无声音频保活机制
    function startAudioKeepAlive() {
        const audio = document.getElementById('bgAudio');
        audio.play().then(() => {
            log("🎵 背景无声音频保活已成功启动", true);
        }).catch(err => {
            log("⚠️ 浏览器阻止了音频自动播放，需要手动戳一下屏幕", true);
        });
    }

    // 手动界面滑块
    function updateSuck(val) {
        document.getElementById('suckVal').innerText = val;
        // 转换成对应的十六进制指令测试
        let hexCmd = "550201" + parseInt(val).toString(16).padStart(2, '0');
        log(`🎛️ 手动调节吮吸至 ${val} 档，发送 Hex: ${hexCmd}`, true);
        sendHex(hexCmd);
    }

    function sendCustomHex() {
        const hex = document.getElementById('hexCommand').value.trim();
        if(hex) {
            log(`✍️ 手动发送自定义 Hex: ${hex}`, true);
            sendHex(hex);
        }
    }

    // 6. 停止所有功能
    function stopAll() {
        // 清除定时器
        if (mcpTimer) clearInterval(mcpTimer);
        if (keepAliveTimer) clearInterval(keepAliveTimer);
        isPolling = false;
        
        document.getElementById('pollStatus').innerText = "已停止";
        document.getElementById('pollStatus').classList.remove('online');

        // 停止音频
        const audio = document.getElementById('bgAudio');
        audio.pause();

        // 断开蓝牙
        if (bluetoothDevice && bluetoothDevice.gatt.connected) {
            bluetoothDevice.gatt.disconnect();
            log("🔌 蓝牙已主动断开连接", true);
        }
        
        log("🛑 已重置并停止所有中继和保活进程。", true);
    }
</script>
</body>
</html>
