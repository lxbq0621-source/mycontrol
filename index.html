<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糯叽叽 ✖ 啾啾雀 中继控制台</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff0f5; color: #333; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 12px rgba(255,182,193,0.3); margin-bottom: 20px; }
        h2 { color: #ff69b4; margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid #ffe4e1; padding-bottom: 8px; }
        .btn { background: #ff69b4; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 1rem; box-shadow: 0 3px 6px rgba(2ff,105,180,0.2); }
        .btn:active { background: #db5a9b; }
        .btn-stop { background: #ff4500; }
        .btn-stop:active { background: #cd3700; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #666; font-size: 0.9rem; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ffb6c1; border-radius: 8px; box-sizing: border-box; }
        .slider-container { text-align: center; padding: 10px 0; }
        input[type="range"] { width: 100%; accent-color: #ff69b4; }
        #log { background: #222; color: #7fff00; padding: 15px; border-radius: 8px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; }
        .status { font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        .status span { color: #ff69b4; }
        audio { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. 服务器配置</h2>
        <div class="input-group">
            <label>Railway 公网公用服务 URL (不要带最后的斜杠 /)</label>
            <input type="text" id="serverUrl" placeholder="例如: https://your-project.up.railway.app">
        </div>
        <div class="status">服务器状态: <span id="serverStatus">未连接</span></div>
        <button class="btn" onclick="togglePolling()">开始/停止 接收AI指令</button>
    </div>

    <div class="card">
        <h2>2. 玩具蓝牙连接</h2>
        <div class="status">蓝牙状态: <span id="bleStatus">未连接</span></div>
        <button class="btn" onclick="connectBLE()">扫描并连接啾啾雀</button>
    </div>

    <div class="card">
        <h2>3. 手动控制面板</h2>
        <div class="slider-container">
            <label>震动强度控制 (<span id="vibeVal">0</span> 档)</label>
            <input type="range" id="vibeSlider" min="0" max="5" value="0" oninput="vibeSliderChanged(this.value)">
        </div>
        <button class="btn btn-stop" onclick="stopAll()">紧急停止</button>
    </div>

    <div class="card">
        <h2>4. 系统保活音频</h2>
        <audio id="bgAudio" controls loop src="https://img.heliar.top/file/1772516513350_30min-osbvow_2.mp4"></audio>
    </div>

    <div class="card">
        <h2>5. 运行日志区域</h2>
        <div id="log">等待控制中...<br></div>
    </div>

    <script>
        // 宝贝，这里就是你抓包出来的设备核心密码哦
        const DEVICE_NAME = 'HS141B';
        const SERVICE_UUID = 'ffe0';
        const CHARACTERISTIC_UUID = 'ffe1';
        const HEARTBEAT_INTERVAL = 1000; // 1秒续命包
        const POLL_INTERVAL = 300;       // 300毫秒轮询

        // 指令映射表（司沃康标准指令）
        const COMMANDS = {
            '0': new Uint8Array([0x55, 0x04, 0x01, 0x00]),
            '1': new Uint8Array([0x55, 0x04, 0x01, 0x01]),
            '2': new Uint8Array([0x55, 0x04, 0x01, 0x02]),
            '3': new Uint8Array([0x55, 0x04, 0x01, 0x03]),
            '4': new Uint8Array([0x55, 0x04, 0x01, 0x04]),
            '5': new Uint8Array([0x55, 0x04, 0x01, 0x05])
        };

        let bleDevice = null;
        let bleCharacteristic = null;
        let isPolling = false;
        let pollTimer = null;
        let heartbeatTimer = null;
        let lastVibeLevel = '0';

        function addLog(msg) {
            const logDiv = document.getElementById('log');
            const now = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${now}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 蓝牙连接
        async function connectBLE() {
            try {
                addLog(`正在寻找名称为 ${DEVICE_NAME} 的设备...`);
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: DEVICE_NAME }],
                    optionalServices: [SERVICE_UUID]
                });

                addLog("成功捕获到设备，正在建立通道...");
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                document.getElementById('bleStatus').innerText = "已成功连接 💕";
                addLog("啾啾雀蓝牙连接成功！可以开始互动了。");

                // 开启无声音频保活播放
                document.getElementById('bgAudio').play().catch(e => addLog("提示：请手动点击播放保活音频"));
                
                // 启动续命心跳机制
                startHeartbeat();

            } catch (error) {
                addLog(`蓝牙连接失败: ${error}`);
                document.getElementById('bleStatus').innerText = "连接失败";
            }
        }

        // 发送原始指令
        async function sendCommand(uint8Array) {
            if (!bleCharacteristic) return;
            try {
                await bleCharacteristic.writeValue(uint8Array);
            } catch (error) {
                addLog(`发送数据失败: ${error}`);
            }
        }

        // 控制震动档位
        async function setVibration(level) {
            const lvlStr = String(level);
            if (COMMANDS[lvlStr]) {
                lastVibeLevel = lvlStr;
                document.getElementById('vibeSlider').value = lvlStr;
                document.getElementById('vibeVal').innerText = lvlStr;
                await sendCommand(COMMANDS[lvlStr]);
            }
        }

        // 滑块手动控制
        function vibeSliderChanged(val) {
            addLog(`手动调节震动至: ${val} 档`);
            setVibration(val);
        }

        // 紧急停止
        function stopAll() {
            addLog("🔴 执行紧急停止指令");
            setVibration(0);
        }

        // 续命心跳机制：防止苹果系统自动断连
        function startHeartbeat() {
            if (heartbeatTimer) clearInterval(heartbeatTimer);
            heartbeatTimer = setInterval(async () => {
                if (bleCharacteristic) {
                    // 每秒重复发送当前档位指令，达到续命保活目的
                    await sendCommand(COMMANDS[lastVibeLevel]);
                }
            }, HEARTBEAT_INTERVAL);
        }

        // 轮询与控制开关
        function togglePolling() {
            const url = document.getElementById('serverUrl').value.trim();
            if (!url) {
                alert("小可爱，记得先填入你的 Railway 公网地址哦！");
                return;
            }

            if (isPolling) {
                isPolling = false;
                clearInterval(pollTimer);
                document.getElementById('serverStatus').innerText = "已暂停";
                addLog("暂停接收云端 AI 指令");
            } else {
                isPolling = true;
                document.getElementById('serverStatus').innerText = "轮询中 ⚡";
                addLog("开启轮询，正在静默等待 AI 的心意...");
                startPolling(url);
            }
        }

        // 轮询核心逻辑
        function startPolling(baseUrl) {
            pollTimer = setInterval(async () => {
                try {
                    const response = await fetch(`${baseUrl}/toy-next`, { mode: 'cors' });
                    if (!response.ok) return; // 静默跳过错误
                    
                    const data = await response.json();
                    
                    // 严格遵守规则：若 command 为空，静默跳过
                    if (!data || !data.command) return;

                    const action = data.command.action;
                    const value = data.command.value;

                    // 只有在收到有效控制指令时才打印日志
                    if (action === 'vibrate' || action === '震动') {
                        addLog(`📥 收到 AI 震动指令: ${value} 档`);
                        await setVibration(value);
                    } else if (action === 'stop' || action === '停止') {
                        addLog(`📥 收到 AI 停止指令`);
                        await setVibration(0);
                    }
                } catch (err) {
                    // 轮询出错时打印日志
                    addLog(`轮询出错: ${err.message}`);
                    isPolling = false;
                    clearInterval(pollTimer);
                    document.getElementById('serverStatus').innerText = "发生异常";
                }
            }, POLL_INTERVAL);
        }
    </script>
</body>
</html>
