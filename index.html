<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属控制台 - 吮吸增强版</title>
    <style>
        :root {
            --primary-color: #ff85a2;
            --bg-color: #fff0f3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #4a4a4a;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(255, 133, 162, 0.1);
        }
        h2 {
            color: var(--primary-color);
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffe3e8;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active {
            background-color: #ff6b8b;
        }
        .btn-stop {
            background-color: #ff4d4d;
        }
        .btn-stop:active {
            background-color: #e60000;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .btn-mode {
            background-color: #fff;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 8px;
            font-size: 0.9rem;
            border-radius: 6px;
        }
        .btn-mode.active {
            background-color: var(--primary-color);
            color: white;
        }
        input[type="range"] {
            width: 100%;
            margin: 15px 0;
            accent-color: var(--primary-color);
        }
        #log {
            background: #2b2b2b;
            color: #70c930;
            padding: 12px;
            border-radius: 8px;
            height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. 同步服务器设置</h2>
        <input type="text" id="serverUrl" placeholder="请输入你的 Railway 地址 (https://...)" />
        <button id="btnConnectServer">开始接收 AI 指令</button>
    </div>

    <div class="card">
        <h2>2. 蓝牙连接 (HS141B)</h2>
        <button id="btnConnectBle">扫描并连接啾啾雀</button>
        <button id="btnStop" class="btn-stop" style="margin-top:10px;">紧急停止</button>
    </div>

    <div class="card">
        <h2>3. 吮吸模式手动测试</h2>
        <label>滑动调节强度 (0% - 100%)：<span id="intensityVal">0%</span></label>
        <input type="range" id="rangeIntensity" min="0" max="100" value="0">
        
        <label>选择自动波形模式：</label>
        <div class="grid">
            <button class="btn-mode" onclick="setSuctionMode(1)">模式 1</button>
            <button class="btn-mode" onclick="setSuctionMode(2)">模式 2</button>
            <button class="btn-mode" onclick="setSuctionMode(3)">模式 3</button>
            <button class="btn-mode" onclick="setSuctionMode(4)">模式 4</button>
            <button class="btn-mode" onclick="setSuctionMode(5)">模式 5</button>
            <button class="btn-mode" onclick="setSuctionMode(6)">模式 6</button>
            <button class="btn-mode" onclick="setSuctionMode(7)">模式 7</button>
            <button class="btn-mode" onclick="setSuctionMode(8)">模式 8</button>
        </div>
    </div>

    <div class="card">
        <h2>4. 系统保活音频</h2>
        <audio controls loop id="bgAudio">
            <source src="https://actions.google.com/sounds/v1/ambiences/ambient_hum_air_conditioner.ogg" type="audio/ogg">
        </audio>
    </div>

    <div class="card">
        <h2>5. 运行日志区域</h2>
        <div id="log">等待操作...</div>
    </div>

    <script>
        let bleDevice = null;
        let bleCharacteristic = null;
        let currentMode = 1;
        let currentIntensity = 0;
        let serverInterval = null;

        function log(text) {
            const time = new Date().toLocaleTimeString();
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `[${time}] ${text}<br/>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 蓝牙连接逻辑
        document.getElementById('btnConnectBle').addEventListener('click', async () => {
            log("正在扫描蓝牙设备...");
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000fee9', '0000f00d'] 
                });
                
                log(`发现设备: ${bleDevice.name}，正在连接...`);
                const server = await bleDevice.gatt.connect();
                
                // 尝试通用控制服务
                let service;
                try {
                    service = await server.getPrimaryService('0000fee9');
                } catch(e) {
                    service = await server.getPrimaryService('0000f00d');
                }
                
                const characteristics = await service.getCharacteristics();
                bleCharacteristic = characteristics[0]; 
                
                log("啾啾雀蓝牙连接成功！吸吸模式就绪。");
                // 激活音频保活
                document.getElementById('bgAudio').play().catch(()=>{});
            } catch (error) {
                log("蓝牙连接失败: " + error.message);
            }
        });

        // 核心吸吮指令构造
        async function sendSuctionCmd(mode, intensity) {
            if (!bleCharacteristic) return;
            try {
                // 针对该系列吸吮玩具的通用复合控制协议：通常参数1控制模式类型，参数2控制马达上限
                // 这里构造8字节标准控制流，专门针对吸吮腔特征码进行映射
                let uint8 = new Uint8Array(8);
                uint8[0] = 0x55; // 起始头
                uint8[1] = 0x04; // 吸吮功能标识码
                uint8[2] = mode & 0xFF; // 8个波形模式
                uint8[3] = Math.round((intensity / 100) * 255); // 映射至0-255强度
                uint8[4] = 0x00;
                uint8[5] = 0x00;
                // 校验和
                let checksum = 0;
                for(let i=0; i<6; i++) checksum += uint8[i];
                uint8[6] = checksum & 0xFF;
                uint8[7] = 0xAA; // 结束符

                await bleCharacteristic.writeValue(uint8);
            } catch (e) {
                // 降级兼容指令（部分硬件采用3字节短控制流）
                try {
                    let shortUint8 = new Uint8Array([0x03, mode, Math.round((intensity / 100) * 100)]);
                    await bleCharacteristic.writeValue(shortUint8);
                } catch(err) {
                    log("指令发送失败，请确保后台没有其它App抢占设备");
                }
            }
        }

        // 手动模式控制
        function setSuctionMode(m) {
            currentMode = m;
            document.querySelectorAll('.btn-mode').forEach((b, idx) => {
                if(idx === m-1) b.classList.add('active');
                else b.classList.remove('active');
            });
            log(`手动切换至：模式 ${m}`);
            sendSuctionCmd(currentMode, currentIntensity);
        }

        document.getElementById('rangeIntensity').addEventListener('input', (e) => {
            currentIntensity = e.target.value;
            document.getElementById('intensityVal').innerText = currentIntensity + "%";
            sendSuctionCmd(currentMode, currentIntensity);
        });

        document.getElementById('btnStop').addEventListener('click', () => {
            currentIntensity = 0;
            document.getElementById('rangeIntensity').value = 0;
            document.getElementById('intensityVal').innerText = "0%";
            sendSuctionCmd(1, 0);
            log("🛑 已紧急停止所有吸吮动作");
        });

        // Railway 同步逻辑
        document.getElementById('btnConnectServer').addEventListener('click', () => {
            let url = document.getElementById('serverUrl').value.trim();
            if(!url) { alert("请输入有效的链接哦！"); return; }
            if(url.endsWith('/')) url = url.slice(0, -1);

            if(serverInterval) clearInterval(serverInterval);
            log("已开启 Railway 联动，正在同步沈翊的指令...");

            serverInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${url}/get_command`);
                    const data = await res.json();
                    if(data && data.command) {
                        // 动态解析糯叽叽下发的强度值 (通常0-5或0-100)
                        let rawVal = parseInt(data.command);
                        if(!isNaN(rawVal)) {
                            // 自动映射到玩具吸吮强度
                            let mappedIntensity = rawVal;
                            if(rawVal <= 5 && rawVal > 0) mappedIntensity = rawVal * 20; 
                            
                            if(mappedIntensity === 0) {
                                currentIntensity = 0;
                                sendSuctionCmd(1, 0);
                            } else {
                                currentIntensity = mappedIntensity;
                                // 默认使用用户当前选中的模式或基础自动模式
                                sendSuctionCmd(currentMode, currentIntensity);
                            }
                            document.getElementById('rangeIntensity').value = currentIntensity;
                            document.getElementById('intensityVal').innerText = currentIntensity + "%";
                            log(`同步成功！沈翊让你当前吸吮强度变为: ${currentIntensity}%`);
                        }
                    }
                } catch(e) {
                    // 静默错误，防止日志刷屏
                }
            }, 1500);
        });
    </script>
</body>
</html>
